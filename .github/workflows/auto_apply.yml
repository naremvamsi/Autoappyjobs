name: Auto Apply Jobs

permissions:
  contents: write

on:
  schedule:
    # Runs at 00:00, 08:00, and 16:00 IST every day
    - cron: '30 18,2,10 * * *'

jobs:
  run-auto-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore state.json from secret
        run: |
          echo "${{ secrets.STATE_JSON_B64 }}" | base64 -d > state.json

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers and deps
        run: |
          python -m playwright install --with-deps

      - name: Run auto apply
        run: |
          python auto_apply.py

      - name: Commit applied_jobs.txt (if changed)
        run: |
          if [ -f applied_jobs.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add applied_jobs.txt || true
            if ! git diff --cached --quiet; then
              git commit -m "Update applied_jobs.txt from workflow"
              git push
            else
              echo "No changes to applied_jobs.txt"
            fi
          else
            echo "applied_jobs.txt not present"
          fi
